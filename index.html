<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gradient Generator</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/sweetalert2@11/dist/sweetalert2.min.css">
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <div class="container py-5">

        <h1 class="text-center mb-5 fw-bold">Gradient Generator</h1>

        <div class="row g-4 align-items-start">

            
            <div class="col-lg-5 text-center">
                <div class="preview-wrapper">
                    <div class="preview-box" id="box">
                        Gradient Preview
                    </div>
                </div>
            </div>

            
            <div class="col-lg-7">
                <div class="card shadow-sm p-4 border-0 rounded-4">

                    <div class="mb-3">
                        <label class="form-label">Color 1</label>
                        <input type="color" class="form-control form-control-color" id="color1" value="#6a85f1">
                    </div>

                    <div class="mb-3">
                        <label class="form-label">Color 2</label>
                        <input type="color" class="form-control form-control-color" id="color2" value="#8e54e9">
                    </div>

                    <div class="mb-4">
                        <label class="form-label">Direction</label>
                        <select class="form-select" id="direction">
                            <option value="to right">Left to Right</option>
                            <option value="to left">Right to Left</option>
                            <option value="to bottom">Top to Bottom</option>
                            <option value="to top">Bottom to Top</option>
                            <option value="45deg">45 Degree</option>
                            <option value="135deg">135 Degree</option>
                        </select>
                    </div>

                    <h6 class="fw-bold">CSS Code</h6>

                    <div class="code-box mb-3" id="cssCode">
                        background: linear-gradient(to right, #6a85f1, #8e54e9);
                    </div>

                    <button class="btn-gradient w-100" id="copyBtn">
                        Copy CSS
                    </button>
                        
                </div>
            </div>

        </div>

    </div>


    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
        crossorigin="anonymous"></script>
    <script src="app.js"></script>
</body>

</html>
